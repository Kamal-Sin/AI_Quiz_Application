# Render Deployment Configuration

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0
server.connection-timeout=20000

# MongoDB Atlas Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/quizapp}
spring.data.mongodb.database=${MONGODB_DATABASE:quizapp}
spring.data.mongodb.auto-index-creation=true

# MongoDB Connection Settings
spring.data.mongodb.connection-pool.max-size=10
spring.data.mongodb.connection-pool.min-size=5
spring.data.mongodb.connection-pool.max-wait-time=30000
spring.data.mongodb.connection-pool.max-connection-life-time=300000

# JPA Configuration (disabled for MongoDB)
spring.jpa.enabled=false

# Logging (Production level)
logging.level.org.springframework.web=WARN
logging.level.com.quizapp=INFO
logging.level.org.springframework.data.mongodb=WARN
logging.level.org.mongodb.driver=WARN
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.context.annotation=WARN

# Startup Configuration
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true
spring.main.lazy-initialization=false

# Security Configuration
spring.security.basic.enabled=false

# CORS Configuration (handled by WebConfig.java)
# spring.web.cors.allowed-origins=${ALLOWED_ORIGINS:https://*.vercel.app,https://*.render.com,https://*.herokuapp.com,http://localhost:3000}
# spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
# spring.web.cors.allowed-headers=*
# spring.web.cors.allow-credentials=true

# Gemini API Configuration (optional)
gemini.api.key=${GEMINI_API_KEY:}

# Health Check Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
management.health.mongo.enabled=true
management.health.defaults.enabled=true

# Performance Configuration
spring.data.mongodb.auto-index-creation=true
