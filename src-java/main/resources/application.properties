# Main Application Configuration (Default for all environments)

# Server Configuration
server.port=${PORT:8080}

# MongoDB Atlas Configuration (Default for all environments)
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:quizapp}

# MongoDB Connection Settings
spring.data.mongodb.connection-pool.max-size=10
spring.data.mongodb.connection-pool.min-size=5
spring.data.mongodb.connection-pool.max-wait-time=30000
spring.data.mongodb.connection-pool.max-connection-life-time=300000
spring.data.mongodb.auto-index-creation=true

# JPA Configuration (disabled for MongoDB)
spring.jpa.enabled=false

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.quizapp=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.boot.autoconfigure=WARN
logging.level.org.springframework.context.annotation=WARN

# Startup Configuration
spring.main.allow-bean-definition-overriding=true
spring.main.allow-circular-references=true

# Gemini API Configuration (optional)
gemini.api.key=${GEMINI_API_KEY:}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator

# CORS Configuration (basic)
spring.web.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
