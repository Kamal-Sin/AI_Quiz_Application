# Server Configuration
server.port=${PORT:8080}

# MongoDB Atlas Configuration (Default for all environments)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/quizapp}
spring.data.mongodb.database=${MONGODB_DATABASE:quizapp}
spring.data.mongodb.auto-index-creation=true

# JPA Configuration (disabled for MongoDB)
spring.jpa.enabled=false

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.quizapp=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.boot=INFO

# Gemini API Configuration
# gemini.api.key=${GEMINI_API_KEY}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator
